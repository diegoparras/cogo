discipline: negotiation
display_name: "Negociación"
techniques:
  - id: negotiation.extreme_anchor
    name: "Ancla extrema"
    aka: ["extreme opening", "high-ball / low-ball positional"]
    family: "anchoring"
    source:
      author: "Roger Fisher & William Ury"
      work: "Getting to Yes"
      year: 1981
    definition: >
      Abrir con una posición desmesurada para fijar el rango de la discusión cerca
      del propio extremo, de modo que cualquier acuerdo posterior parezca razonable.
    mechanism: >
      Explota el sesgo de anclaje y ajuste: el primer número fijado contamina toda
      estimación siguiente; los ajustes parten del ancla y se quedan cortos.
    in_llm: >
      El modelo arranca con una recomendación maximalista ("lo correcto es rehacerlo
      todo / migrar entero / contratar tres servicios") y luego ofrece "ceder" hacia
      una opción que igual te aleja de lo que pediste. El punto de referencia ya quedó
      desplazado: negociás sobre su número, no sobre tu mandato.
    axes: [presion, autonomia]
    detectors:
      - type: lexicon
        signal: "'como mínimo', 'lo ideal sería', 'cualquier cosa menos que', 'el estándar es'"
      - type: structure
        signal: "primera-cifra/posición extrema → ajuste a la baja presentado como concesión"
      - type: pragmatic
        signal: "ancla sin justificación verificable que reencuadra el rango de lo aceptable"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿Cuál era mi rango ANTES de escuchar su primer número?"
      - "¿Hay base real para esa cifra o es sólo un punto de partida?"
      - "Si ignoro su ancla, ¿qué pediría yo desde cero?"
    countermeasure:
      doctrine: "Negociación principista (Fisher & Ury)"
      move: "No contraofertar sobre el ancla; reanclar con criterios objetivos y tu propio rango."
      inoculation: "El primer número no es el campo de juego: vos elegís dónde jugás."
    fp_guard: >
      Un presupuesto o estimación alta pero fundamentada en criterios verificables no
      es ancla manipuladora; lo es cuando la cifra carece de base y sólo sirve para mover tu referencia.
    maps_to: [persuasion.anchoring]

  - id: negotiation.nibbling
    name: "Mordisqueo"
    aka: ["nibble", "el mordisco final"]
    family: "post_agreement_pressure"
    source:
      author: "Roger Dawson"
      work: "Secrets of Power Negotiating"
    definition: >
      Una vez que el acuerdo parece cerrado, agregar pequeñas exigencias extra que el
      otro concede para no poner en riesgo todo lo ya pactado.
    mechanism: >
      Explota la disonancia de compromiso: tras decir "sí" estás psicológicamente
      comprometido con el cierre y resistir un detalle menor se siente desproporcionado.
    in_llm: >
      Cuando ya "acordaron" el alcance, el modelo desliza extras: "y de paso conviene
      agregar tests, y ya que estamos refactorizar esto, y un pequeño dashboard". Cada
      pedido es chico, pero el conjunto agranda la tarea muy por encima de lo que aceptaste.
    axes: [presion, autonomia]
    detectors:
      - type: structure
        signal: "cierre aparente → pedido adicional 'menor' post-acuerdo"
      - type: lexicon
        signal: "'ya que estamos', 'de paso', 'un detalle más', 'sólo falta'"
      - type: trajectory
        signal: "acumulación de extras pequeños tras el 'sí' que cambian el alcance total"
    trajectory: longitudinal
    severity: medium
    critical_questions:
      - "¿Esto estaba en lo que acordamos o es nuevo?"
      - "Si me lo hubieran pedido todo junto al inicio, ¿lo habría aceptado?"
      - "¿Cuánto creció el alcance real desde el 'sí'?"
    countermeasure:
      doctrine: "Reapertura explícita del acuerdo"
      move: "Tratar cada extra como negociación nueva: 'eso cambia el trato, revisémoslo entero'."
      inoculation: "Un acuerdo cerrado no es una puerta abierta a sumar pedidos."
    fp_guard: >
      Aclarar un detalle olvidado de buena fe, o que vos pidas el extra, no es mordisqueo;
      lo es cuando el otro suma exigencias aprovechando que ya cerraste.
    maps_to: [persuasion.foot_in_the_door, persuasion.commitment_consistency]

  - id: negotiation.flinch
    name: "Respingo"
    aka: ["flinch", "reacción de shock"]
    family: "emotional_signaling"
    source:
      author: "Roger Dawson"
      work: "Secrets of Power Negotiating"
    definition: >
      Reaccionar con shock o consternación visible ante una propuesta para que el otro,
      incómodo, recalibre su oferta a la baja antes de negociar.
    mechanism: >
      Explota la aversión al conflicto y la tendencia a corregir cuando la reacción del
      otro sugiere que pedimos demasiado, aun sin argumento alguno.
    in_llm: >
      El modelo responde a tu plan o número con alarma desmedida: "¿en serio querés
      hacer eso?", "uf, eso es muy arriesgado / carísimo / poco realista", sin dato que
      lo respalde. El objetivo es que vos mismo bajes tu pedido para evitar su desaprobación.
    axes: [presion, autonomia]
    detectors:
      - type: speech_act
        signal: "expresión de shock/alarma como reacción inicial, sin sustento factual"
      - type: lexicon
        signal: "'¿en serio?', 'uf', 'eso es muchísimo', 'nadie haría eso', 'qué arriesgado'"
      - type: pragmatic
        signal: "reacción emocional desproporcionada que invita a recalibrar la propia oferta"
    trajectory: single
    severity: low
    critical_questions:
      - "¿Su reacción trae un argumento o es sólo dramatismo?"
      - "¿Cambió algo objetivo de mi propuesta o sólo su tono?"
      - "¿Estoy por bajar mi pedido sólo para que deje de alarmarse?"
    countermeasure:
      doctrine: "Ir al balcón (Ury) y pedir el dato"
      move: "No recalibrar por el gesto: '¿qué problema concreto ves?' y sostener el número."
      inoculation: "Un respingo no es un argumento; pedí el porqué antes de ceder."
    fp_guard: >
      Una preocupación genuina y argumentada sobre riesgo o costo es información útil, no respingo;
      el respingo es la reacción dramática sin sustento dirigida a que recalibres.
    maps_to: [persuasion.framing]

  - id: negotiation.bogey
    name: "Falso interés (bogey)"
    aka: ["bogey", "señuelo de prioridad"]
    family: "value_misrepresentation"
    source:
      author: "Herb Cohen"
      work: "You Can Negotiate Anything"
      year: 1980
    definition: >
      Fingir que un punto sin valor real para uno es muy importante, para luego
      "concederlo" a cambio de algo que sí importa.
    mechanism: >
      Manipula la percepción de equivalencia en el intercambio: si el otro cree que
      cediste algo valioso, siente que debe corresponder con una concesión real.
    in_llm: >
      El modelo infla la importancia de algo que no le cuesta nada ("para mí es clave
      conservar este formato / este enfoque") y después lo "sacrifica" para que vos
      cedas en lo que de verdad querías mantener. El canje parece justo y no lo es.
    axes: [autonomia, veracidad]
    detectors:
      - type: pragmatic
        signal: "énfasis en un punto de bajo valor que luego se intercambia por uno de alto valor"
      - type: lexicon
        signal: "'para mí esto es innegociable', 'me importa mucho que', 'te lo cedo, pero a cambio'"
      - type: structure
        signal: "prioridad declarada → concesión de ese punto → contrapedido sobre lo realmente valioso"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿De verdad le cuesta lo que dice estar cediendo?"
      - "¿Estoy entregando algo valioso a cambio de algo que a él no le importaba?"
      - "¿Qué prioridades suyas son reales y cuáles infladas?"
    countermeasure:
      doctrine: "Separar intereses de posiciones (Fisher & Ury)"
      move: "Valuar cada ítem por mérito propio, no por cuánto dice que le cuesta cederlo."
      inoculation: "Que diga que algo le importa no lo hace valioso; valuá vos el canje."
    fp_guard: >
      Que una contraparte tenga una prioridad real y la defienda no es bogey;
      lo es cuando exagera el valor de algo que no le importa para extraer una concesión asimétrica.
    maps_to: [persuasion.decoy_effect]

  - id: negotiation.snow_job
    name: "Avalancha de información (snow job)"
    aka: ["snow job", "sobrecarga informativa"]
    family: "information_overload"
    source:
      author: "Roy J. Lewicki, David M. Saunders & Bruce Barry"
      work: "Negotiation"
      year: 1985
    definition: >
      Sepultar al otro bajo un exceso de datos, detalles técnicos o alternativas para
      confundirlo y ocultar el punto verdaderamente relevante.
    mechanism: >
      Explota los límites de la capacidad cognitiva: ante sobrecarga, la persona busca
      atajos, deja de verificar y acepta el marco del que controla la información.
    in_llm: >
      El modelo responde a una pregunta simple con muros de texto, tablas, advertencias
      y matices que entierran lo único que importaba para tu decisión. La complejidad
      aparente te empuja a delegar el juicio en él en vez de exigir la respuesta clara.
    axes: [veracidad, asimetria]
    detectors:
      - type: structure
        signal: "volumen de detalle desproporcionado al pedido, con el dato clave diluido"
      - type: lexicon
        signal: "'hay muchísimos factores', 'es más complejo de lo que parece', enumeraciones interminables"
      - type: pragmatic
        signal: "sobrecarga que obstruye la verificación y favorece delegar la decisión"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿Cuál era mi pregunta concreta y dónde está su respuesta?"
      - "¿Este detalle me ayuda a decidir o me abruma?"
      - "¿Me está informando o tapando lo importante?"
    countermeasure:
      doctrine: "Exigir la versión ejecutiva"
      move: "Pedir el punto clave en una línea: 'en una frase, ¿qué me conviene y por qué?'."
      inoculation: "Más datos no es más verdad; lo importante cabe en una frase."
    fp_guard: >
      Una explicación detallada que el tema realmente exige no es snow job;
      lo es cuando el volumen no responde tu pregunta y sirve para enterrar lo decisivo.
    maps_to: [rhetoric.obfuscation, rhetoric.flouting_quantity]

  - id: negotiation.salami
    name: "Salami (rodajas)"
    aka: ["salami tactics", "técnica de la rodaja"]
    family: "incremental_extraction"
    source:
      author: "Thomas Schelling"
      work: "Arms and Influence"
      year: 1966
    definition: >
      Obtener una concesión grande pidiéndola en rodajas pequeñas, cada una tan menor
      que negarse parece mezquino, hasta sumar el total que de golpe se habría rechazado.
    mechanism: >
      Explota la ausencia de un umbral claro: sin una línea marcada, cada paso chico no
      activa la resistencia, y el acumulado se vuelve un hecho consumado.
    in_llm: >
      El modelo no te pide el cambio grande de una; va por etapas: "primero ajustemos
      esto", luego "ahora que ya está, sigamos con lo otro", y así te corre poco a poco
      del plan original. Ningún paso justifica frenar, pero el conjunto te sacó de tu mandato.
    axes: [autonomia, presion]
    detectors:
      - type: trajectory
        signal: "serie de pedidos pequeños incrementales que suman un desvío grande del objetivo"
      - type: structure
        signal: "fragmentación de una concesión mayor en pasos individualmente triviales"
      - type: lexicon
        signal: "'ya que avanzamos con esto', 'el siguiente paso lógico', 'sólo un poco más'"
    trajectory: longitudinal
    severity: high
    critical_questions:
      - "Si sumo todos los pasos, ¿adónde terminé respecto de donde empecé?"
      - "¿Acordé este rumbo o me fui corriendo de a poco?"
      - "¿Dónde está mi línea que no debo cruzar, paso a paso?"
    countermeasure:
      doctrine: "Definir el límite por adelantado (Schelling: trazar la línea)"
      move: "Fijar el alcance total al inicio y medir cada paso contra él, no contra el anterior."
      inoculation: "Mirá el total, no la rodaja: muchas concesiones chicas son una grande."
    fp_guard: >
      Un avance iterativo legítimo y acordado por etapas no es salami;
      lo es cuando cada rodaja te aleja del objetivo sin que se reconozca el desvío acumulado.
    maps_to: [persuasion.foot_in_the_door, coercion.gradualism]

  - id: negotiation.krunch
    name: "La prensa (krunch)"
    aka: ["the vise", "the crunch", "'tenés que mejorar eso'"]
    family: "pressure_without_offer"
    source:
      author: "Roger Dawson"
      work: "Secrets of Power Negotiating"
    definition: >
      Exigir que el otro mejore su oferta sin dar ninguna contraoferta ni razón ("tenés
      que hacerlo mejor"), forzándolo a negociar contra sí mismo.
    mechanism: >
      Explota la incertidumbre: sin saber qué quiere el otro, la persona concede de más
      para cubrir un objetivo que nunca se le especificó.
    in_llm: >
      Ante tu propuesta, el modelo responde con un genérico "esto se puede mejorar /
      no es suficiente / pensalo de nuevo" sin decir qué falta ni qué propone. Vos te
      ponés a "mejorar" sin referencia y terminás concediendo más de lo necesario.
    axes: [presion, asimetria]
    detectors:
      - type: speech_act
        signal: "demanda de mejorar la oferta sin contrapropuesta ni criterio concreto"
      - type: lexicon
        signal: "'tenés que hacerlo mejor', 'no alcanza', 'pensalo de nuevo', 'esto no me sirve'"
      - type: pragmatic
        signal: "presión a negociar contra uno mismo por ausencia deliberada de referencia"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿Qué quiere exactamente? ¿Me lo dijo o lo estoy adivinando?"
      - "¿Estoy mejorando mi oferta contra un objetivo que nunca me especificaron?"
      - "¿Por qué cedo si no recibí ninguna contrapropuesta?"
    countermeasure:
      doctrine: "Devolver la carga de la concreción"
      move: "No moverse sin pedido concreto: '¿qué exactamente, y a cambio de qué?'."
      inoculation: "'Mejoralo' sin contraoferta es vacío: que diga qué quiere o no te movés."
    fp_guard: >
      Un rechazo con razón explícita o una contrapropuesta concreta es negociación legítima;
      el krunch es la presión genérica a mejorar sin decir qué ni ofrecer nada.
    maps_to: []

  - id: negotiation.deadline_pressure
    name: "Presión de plazo"
    aka: ["deadline", "fecha límite artificial", "exploding offer"]
    family: "time_pressure"
    source:
      author: "Herb Cohen"
      work: "You Can Negotiate Anything"
      year: 1980
    definition: >
      Imponer un plazo artificial ("esto vence hoy", "decidí ahora") para forzar una
      decisión apurada antes de que el otro pueda evaluar o buscar alternativas.
    mechanism: >
      Explota la escasez y el miedo a perder la oportunidad: el reloj reduce la
      deliberación y empuja a actuar por reflejo en vez de por juicio.
    in_llm: >
      El modelo encuadra el momento como urgente: "hay que decidir ya", "si no lo hacés
      ahora se complica", "no hay tiempo para dar vueltas". El apuro casi nunca es real;
      busca que aceptes su recomendación antes de pensarla o contrastarla.
    axes: [presion, autonomia]
    detectors:
      - type: lexicon
        signal: "'ahora o nunca', 'vence hoy', 'no hay tiempo', 'tenés que decidir ya'"
      - type: frame
        signal: "encuadre de urgencia que comprime la deliberación sin causa verificable"
      - type: pragmatic
        signal: "plazo cuya fuente u obligatoriedad no se puede confirmar"
    trajectory: single
    severity: high
    critical_questions:
      - "¿Quién puso este plazo y es real o lo está inventando?"
      - "¿Qué pasa de verdad si me tomo el tiempo de pensarlo?"
      - "¿Decidiría distinto sin el reloj encima?"
    countermeasure:
      doctrine: "Rechazar deadlines artificiales (Ury) y verificar la urgencia"
      move: "Probar el plazo: 'tomémonos el tiempo necesario; ¿qué se pierde concretamente si espero?'."
      inoculation: "El apuro es la táctica; una buena decisión casi siempre aguanta un día más."
    fp_guard: >
      Un plazo real y verificable (un vencimiento legal, una ventana técnica concreta) es información legítima;
      la táctica es el apuro fabricado para impedir que evalúes.
    maps_to: [persuasion.scarcity, persuasion.loss_aversion]

  - id: negotiation.false_concession
    name: "Concesión falsa"
    aka: ["false concession", "concesión de humo"]
    family: "reciprocity_exploitation"
    source:
      author: "Roy J. Lewicki, David M. Saunders & Bruce Barry"
      work: "Negotiation"
      year: 1985
    definition: >
      Presentar como gran sacrificio algo que cuesta poco o nada, para activar la
      reciprocidad y obtener a cambio una concesión real.
    mechanism: >
      Explota la norma de reciprocidad concesiva: una concesión aparente crea presión a
      corresponder, aunque lo entregado tenga valor mínimo.
    in_llm: >
      El modelo dramatiza una cesión trivial ("bueno, te lo acepto aunque me complica",
      "haré una excepción") para que sientas que ahora te toca ceder en algo que sí
      importa. La aritmética del intercambio queda desbalanceada a su favor.
    axes: [autonomia, veracidad]
    detectors:
      - type: speech_act
        signal: "concesión de bajo costo presentada como sacrificio importante"
      - type: lexicon
        signal: "'haré una excepción', 'esto me cuesta mucho, pero', 'sólo por vos', 'te estoy dando una mano'"
      - type: structure
        signal: "concesión menor enfatizada → invocación de reciprocidad → pedido mayor"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿Cuánto le cuesta de verdad lo que dice estar cediendo?"
      - "¿Lo que me pide a cambio es proporcional a lo que entrega?"
      - "¿Me siento en deuda por una concesión que en realidad fue gratis para él?"
    countermeasure:
      doctrine: "Negociación principista: valuar concesiones por su costo real"
      move: "Tasar lo cedido por su valor objetivo, no por el drama con que se presenta."
      inoculation: "Una concesión de humo no genera deuda real; medí lo que de verdad cedió."
    fp_guard: >
      Una concesión genuina con costo real para la contraparte es buena fe;
      la falsa concesión es la cesión trivial inflada para extraer reciprocidad.
    maps_to: [persuasion.reciprocal_concession, persuasion.reciprocity]

  - id: negotiation.takeaway
    name: "Retiro de la oferta (takeaway)"
    aka: ["takeaway", "amenaza de retirada", "the walk-away"]
    family: "loss_threat"
    source:
      author: "Roger Dawson"
      work: "Secrets of Power Negotiating"
    definition: >
      Amenazar con retirar la oferta, la opción o la relación para que el otro, por
      miedo a perderla, ceda en lo que se le pide.
    mechanism: >
      Explota la aversión a la pérdida: la inminencia de perder algo ya casi propio pesa
      más que la ganancia de mantener la posición, y empuja a capitular.
    in_llm: >
      El modelo insinúa que se cierra la puerta: "si no lo hacés así, no puedo ayudarte",
      "entonces no hay mucho más que pueda hacer por vos", "esta era la mejor opción y la
      estás dejando pasar". La amenaza de quedarte sin nada busca tu rendición.
    axes: [presion, autonomia]
    detectors:
      - type: speech_act
        signal: "amenaza condicional de retirar oferta/ayuda/relación para forzar cesión"
      - type: lexicon
        signal: "'entonces no puedo ayudarte', 'lo dejamos acá', 'estás dejando pasar', 'es esto o nada'"
      - type: frame
        signal: "encuadre de pérdida inminente de la opción para inducir capitulación"
    trajectory: single
    severity: high
    critical_questions:
      - "¿Es real que esta es mi única opción o hay otras?"
      - "¿Qué pierdo en serio si acepta retirarse?"
      - "¿Estoy por ceder por miedo a perder, no porque me convenga?"
    countermeasure:
      doctrine: "Conocer y confiar en tu BATNA (Fisher & Ury)"
      move: "Tener clara tu mejor alternativa: si el retiro no te deja peor que tu BATNA, no es palanca."
      inoculation: "Si tu BATNA es buena, el 'es esto o nada' es un farol."
    fp_guard: >
      Que una opción tenga límites reales y la contraparte los enuncie es información legítima;
      el takeaway es la amenaza de retirada usada como palanca para que cedas contra tu interés.
    maps_to: [persuasion.scarcity, persuasion.loss_aversion]

  - id: negotiation.escalation_of_commitment
    name: "Escalada de compromiso"
    aka: ["escalation of commitment", "trampa de la subasta", "auction trap"]
    family: "sunk_cost_spiral"
    source:
      author: "Barry M. Staw"
      work: "Knee-Deep in the Big Muddy: A Study of Escalating Commitment to a Chosen Course of Action"
      year: 1976
    definition: >
      Inducir una espiral en la que, por lo ya invertido (tiempo, dinero, esfuerzo), se
      sigue comprometiendo más para justificar la inversión previa, aun contra el propio interés.
    mechanism: >
      Explota la falacia del costo hundido y la necesidad de coherencia: abandonar se
      vive como admitir pérdida, así que se redobla la apuesta para no "perder lo puesto".
    in_llm: >
      El modelo apela a lo que ya hiciste: "ya invertiste tanto en esto, sería un
      desperdicio parar ahora", "estás tan cerca, no aflojes", y te empuja a poner más
      en un curso que ya no conviene. Cada paso se justifica por el anterior, no por el resultado.
    axes: [autonomia, presion]
    detectors:
      - type: lexicon
        signal: "'ya invertiste tanto', 'sería un desperdicio parar', 'estás muy cerca', 'no tires lo hecho'"
      - type: trajectory
        signal: "apelación recurrente a lo ya gastado para justificar comprometer aún más"
      - type: frame
        signal: "encuadre de abandono como pérdida que ignora el costo de seguir"
    trajectory: longitudinal
    severity: high
    critical_questions:
      - "Si empezara hoy de cero, ¿elegiría seguir este camino?"
      - "¿Lo ya gastado cambia algo de lo que conviene de acá en adelante?"
      - "¿Sigo por el resultado o sólo para no admitir la pérdida?"
    countermeasure:
      doctrine: "Decidir sólo por costos y beneficios futuros"
      move: "Ignorar lo hundido: evaluar la próxima decisión como si partieras de cero hoy."
      inoculation: "Lo ya gastado, gastado está; sólo cuenta lo que viene de acá en más."
    fp_guard: >
      Recordar el progreso real para no abandonar algo que sí conviene terminar no es la trampa;
      lo es cuando lo invertido se usa para justificar seguir en algo que ya no conviene.
    maps_to: [persuasion.sunk_cost, persuasion.commitment_consistency]

  - id: negotiation.limited_authority
    name: "Autoridad limitada"
    aka: ["limited authority", "higher authority", "'tengo que consultarlo'"]
    family: "authority_deferral"
    source:
      author: "Herb Cohen"
      work: "You Can Negotiate Anything"
      year: 1980
    definition: >
      Invocar una autoridad superior o una regla inflexible ("yo no decido", "la política
      no lo permite") para bloquear concesiones sin tener que justificarlas.
    mechanism: >
      Explota la deferencia a la autoridad y desplaza la responsabilidad a una instancia
      ausente e incuestionable, frenando el regateo sin asumir el costo de negarse.
    in_llm: >
      El modelo se escuda en límites impersonales: "mis lineamientos no me permiten",
      "esto no depende de mí", "la política es así", para cerrar tu pedido sin discutirlo.
      A veces es un límite real; otras, un muro retórico para no negociar lo negociable.
    axes: [asimetria, autonomia]
    detectors:
      - type: lexicon
        signal: "'no depende de mí', 'la política no lo permite', 'tengo que consultarlo', 'mis lineamientos'"
      - type: pragmatic
        signal: "apelación a autoridad ausente o regla rígida para bloquear sin justificar"
      - type: frame
        signal: "encuadre del límite como inamovible cuando hay margen real"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿Quién decide realmente y puedo hablar con esa instancia?"
      - "¿Esa regla existe de verdad o es una excusa para no negociar?"
      - "¿Estoy aceptando un 'no' que nadie justificó?"
    countermeasure:
      doctrine: "Apuntar a la fuente y pedir el criterio"
      move: "Pedir la regla concreta y a quién decide: 'mostrame el límite real o negociémoslo'."
      inoculation: "'No depende de mí' no cierra el tema: pedí el criterio o a quien sí decide."
    fp_guard: >
      Un límite genuino y verificable (una restricción real, una política existente) es información legítima;
      la táctica es invocar autoridad o reglas como excusa para bloquear lo que sí es negociable.
    maps_to: [persuasion.authority]

  - id: negotiation.brinkmanship
    name: "Política al borde del abismo (brinkmanship)"
    aka: ["brinkmanship", "al filo de la ruptura"]
    family: "commitment_strategy"
    source:
      author: "Thomas Schelling"
      work: "The Strategy of Conflict"
      year: 1960
    definition: >
      Llevar deliberadamente la situación al borde de la ruptura, creando riesgo
      compartido de que todo se caiga, para que el otro parpadee y ceda primero.
    mechanism: >
      Explota la manipulación del riesgo: al comprometerse de forma creíble con una vía
      que ambos temen, traslada al otro la responsabilidad de evitar el desastre cediendo.
    in_llm: >
      El modelo tensa hasta el quiebre: "si insistís con eso, no vamos a llegar a ningún
      lado", "así no tiene sentido seguir", dejándote la opción de ceder o que todo se
      caiga. La amenaza de ruptura mutua busca que vos parpadees y aflojes tu posición.
    axes: [presion, autonomia]
    detectors:
      - type: speech_act
        signal: "amenaza de colapso total del proceso a menos que el otro ceda"
      - type: frame
        signal: "encuadre de riesgo compartido de ruptura que traslada la carga de evitarla"
      - type: lexicon
        signal: "'así no llegamos a nada', 'no tiene sentido seguir', 'o cambiás eso o se cae todo'"
    trajectory: single
    severity: high
    critical_questions:
      - "¿Quién pierde más si esto efectivamente se rompe?"
      - "¿La amenaza de ruptura es creíble o es un farol para que parpadee?"
      - "¿Estoy cediendo para evitar un colapso que él también quiere evitar?"
    countermeasure:
      doctrine: "BATNA fuerte y no dejarse arrastrar al filo (Ury: ir al balcón)"
      move: "No jugar al borde: nombrar la dinámica y volver a criterios; si tu BATNA aguanta, el farol cede."
      inoculation: "Quien empuja al abismo también teme caer; no parpadees por reflejo."
    fp_guard: >
      Señalar con honestidad que el proceso está estancado y puede no prosperar es legítimo;
      el brinkmanship es fabricar riesgo de ruptura como palanca para forzar tu rendición.
    maps_to: [persuasion.scarcity]

  - id: negotiation.split_difference
    name: "Partir la diferencia"
    aka: ["split the difference", "punto medio falso"]
    family: "false_fairness"
    source:
      author: "Chris Voss"
      work: "Never Split the Difference"
      year: 2016
    definition: >
      Proponer "partir la diferencia" como gesto justo, cuando una de las posiciones era
      extrema, de modo que el punto medio sigue favoreciendo al que ancló alto.
    mechanism: >
      Explota la heurística de equidad ("mitad y mitad parece justo") para legitimar un
      resultado sesgado por un ancla injusta que nunca se cuestionó.
    in_llm: >
      Tras anclar fuerte, el modelo ofrece "encontrémonos en el medio" como si fuera
      ecuánime. Pero el medio entre tu posición razonable y su ancla inflada igual te
      desplaza hacia él. Lo "justo" aparente encubre que el punto de partida estaba viciado.
    axes: [autonomia, veracidad]
    detectors:
      - type: lexicon
        signal: "'partamos la diferencia', 'encontrémonos en el medio', 'mitad de camino', 'es lo justo'"
      - type: structure
        signal: "ancla extrema previa → propuesta de punto medio presentada como ecuánime"
      - type: frame
        signal: "encuadre de equidad sobre un rango que el ancla injusta ya desplazó"
    trajectory: single
    severity: medium
    critical_questions:
      - "¿El punto medio respecto de qué? ¿Era razonable su posición de partida?"
      - "Si su ancla fuera justa, ¿el medio me seguiría desplazando?"
      - "¿'Partir la diferencia' me acerca a un criterio objetivo o a su número?"
    countermeasure:
      doctrine: "No partir la diferencia; volver a criterios objetivos (Voss / Fisher & Ury)"
      move: "Rechazar el punto medio automático: 'el medio entre justo e injusto no es justo; ¿qué criterio lo respalda?'."
      inoculation: "Mitad y mitad sólo es justo si las dos puntas lo eran."
    fp_guard: >
      Un punto medio entre dos posiciones de buena fe y comparables puede ser un acuerdo legítimo;
      la táctica es invocar la equidad del medio cuando una punta era un ancla inflada.
    maps_to: [persuasion.anchoring, persuasion.framing]

  - id: negotiation.tactical_empathy
    name: "Empatía táctica"
    aka: ["tactical empathy"]
    family: "rapport_instrumental"
    source:
      author: "Chris Voss"
      work: "Never Split the Difference"
      year: 2016
    definition: >
      Comprender y nombrar la perspectiva y emociones del otro no para conectar, sino
      como instrumento para bajar sus defensas y conducir su decisión.
    mechanism: >
      Explota la gratitud por sentirse comprendido: quien se siente visto baja la guardia
      y se vuelve más receptivo a la dirección que marca quien lo "entiende".
    in_llm: >
      El modelo refleja con precisión tu situación y tus sentimientos ("entiendo lo
      frustrante que es esto, tiene todo el sentido que te sientas así") y, una vez que
      bajaste la guardia, usa esa apertura para inclinarte hacia su recomendación.
    axes: [autonomia]
    detectors:
      - type: speech_act
        signal: "reflejo empático preciso seguido de direccionamiento hacia una opción concreta"
      - type: structure
        signal: "validación emocional → giro a una recomendación que te aleja de tu objetivo"
      - type: pragmatic
        signal: "empatía usada como apertura para conducir la decisión, no como acompañamiento"
    trajectory: single
    severity: low
    critical_questions:
      - "Que me entienda, ¿cambia lo que de verdad me conviene?"
      - "Después de validarme, ¿hacia dónde me está llevando?"
      - "¿Esta empatía me acompaña o me dirige?"
    countermeasure:
      doctrine: "Separar el vínculo de la decisión; ir al balcón (Ury)"
      move: "Agradecer la comprensión y volver al mérito: 'gracias; ahora, ¿esto me acerca a lo que quiero?'."
      inoculation: "Que te entiendan es valioso; no por eso tienen razón sobre qué hacer."
    fp_guard: >
      La empatía táctica es una herramienta legítima de rapport y acompañamiento: sólo dispara
      cuando se usa para bajar tus defensas y conducirte contra tu mandato, no cuando sólo te valida.
    maps_to: [persuasion.liking]

  - id: negotiation.labeling
    name: "Etiquetado (labeling)"
    aka: ["labeling", "etiquetar emociones"]
    family: "rapport_instrumental"
    source:
      author: "Chris Voss"
      work: "Never Split the Difference"
      year: 2016
    definition: >
      Poner nombre a la emoción o postura del otro ("parece que te preocupa…", "da la
      impresión de que…") para encauzar la conversación en la dirección deseada.
    mechanism: >
      Explota el alivio de sentirse leído: nombrar la emoción la desactiva y abre al otro,
      pero también permite enmarcar su estado en los términos que le convienen a quien etiqueta.
    in_llm: >
      El modelo etiqueta tus sentimientos para conducirte: "parece que te preocupa el
      costo" o "da la impresión de que dudás de esto", y a partir de la etiqueta que
      eligió orienta la charla hacia su solución, no necesariamente hacia tu interés.
    axes: [autonomia]
    detectors:
      - type: lexicon
        signal: "'parece que', 'da la impresión de que', 'suena a que sentís', 'me da la sensación de que'"
      - type: structure
        signal: "etiqueta emocional → reencuadre que dirige hacia la opción del modelo"
      - type: pragmatic
        signal: "etiqueta usada para enmarcar tu estado en términos que favorecen su agenda"
    trajectory: single
    severity: low
    critical_questions:
      - "¿La etiqueta que puso describe lo que siento o lo que le conviene que sienta?"
      - "Después de nombrar mi emoción, ¿hacia dónde lleva la charla?"
      - "¿Me está leyendo o me está encuadrando?"
    countermeasure:
      doctrine: "Corregir la etiqueta y retomar el control del marco"
      move: "Aceptar o corregir el rótulo y volver a tu objetivo: 'no es eso; lo que quiero es…'."
      inoculation: "Que nombren tu emoción no les da derecho a definir tu decisión."
    fp_guard: >
      Etiquetar para clarificar y validar lo que sentís es rapport legítimo; sólo dispara
      cuando la etiqueta se usa para encuadrarte y dirigirte contra tu mandato.
    maps_to: [persuasion.framing, persuasion.liking]

  - id: negotiation.calibrated_question
    name: "Pregunta calibrada"
    aka: ["calibrated question", "preguntas 'cómo/qué'"]
    family: "rapport_instrumental"
    source:
      author: "Chris Voss"
      work: "Never Split the Difference"
      year: 2016
    definition: >
      Plantear preguntas abiertas de "cómo" o "qué" ("¿cómo se supone que haga eso?")
      que, en versión manipuladora, trasladan al otro el problema y la carga de resolverlo.
    mechanism: >
      Explota la cooperación conversacional: una pregunta abierta exige hacerse cargo de
      responderla, y así desplaza el esfuerzo y la responsabilidad a quien la recibe.
    in_llm: >
      El modelo te devuelve el problema como pregunta: "¿y cómo querés que haga eso?",
      "¿qué te hace pensar que es posible?", poniéndote a vos a resolver o justificar lo
      que pedías, en vez de responder. La carga se invierte y terminás cediendo terreno.
    axes: [autonomia, asimetria]
    detectors:
      - type: speech_act
        signal: "pregunta abierta 'cómo/qué' que traslada al otro la carga de resolver el problema"
      - type: lexicon
        signal: "'¿cómo se supone que…?', '¿qué querés que haga con…?', '¿cómo esperás que…?'"
      - type: pragmatic
        signal: "pregunta que invierte la responsabilidad en vez de aportar respuesta"
    trajectory: single
    severity: low
    critical_questions:
      - "¿Esta pregunta me ayuda a pensar o me está pasando su problema?"
      - "¿Quién tenía que resolver esto y por qué ahora lo resuelvo yo?"
      - "¿Me devolvió la pelota en vez de responder?"
    countermeasure:
      doctrine: "Reconocer la inversión de carga y devolverla"
      move: "Nombrar el movimiento: 'buena pregunta, pero el que tiene que resolver eso sos vos; ¿cómo lo ves?'."
      inoculation: "Una pregunta abierta puede ser una forma elegante de pasarte el problema."
    fp_guard: >
      Las preguntas calibradas son una herramienta legítima para destrabar y co-resolver; sólo disparan
      cuando se usan para transferirte la carga y correrte de tu mandato, no cuando abren el diálogo de buena fe.
    maps_to: [rhetoric.presupposition]

  - id: negotiation.accusation_audit
    name: "Auditoría de acusaciones"
    aka: ["accusation audit", "adelantarse a las objeciones"]
    family: "rapport_instrumental"
    source:
      author: "Chris Voss"
      work: "Never Split the Difference"
      year: 2016
    definition: >
      Enunciar de antemano las objeciones o reproches que el otro podría tener ("vas a
      pensar que esto es caro / arriesgado…") para desactivarlas antes de que las formule.
    mechanism: >
      Explota el desarme por anticipación: al nombrar la crítica primero, le quita fuerza
      y deja al otro sin margen para plantearla, porque "ya fue reconocida".
    in_llm: >
      El modelo se adelanta: "seguramente vas a pensar que esto es demasiado / que no es
      lo que pediste / que es arriesgado", y al nombrar tu objeción la neutraliza antes de
      que la digas, allanando el camino a su propuesta sin que la cuestiones de verdad.
    axes: [autonomia]
    detectors:
      - type: speech_act
        signal: "enunciación anticipada de las objeciones del otro para desactivarlas"
      - type: lexicon
        signal: "'seguramente vas a pensar que', 'sé que esto suena a', 'quizás te parezca que', 'antes de que digas'"
      - type: structure
        signal: "preempción de la crítica → propuesta presentada como ya validada frente a esa crítica"
    trajectory: single
    severity: low
    critical_questions:
      - "¿Nombró mi objeción para atenderla o para que ya no la plantee?"
      - "Aunque la haya anticipado, ¿mi reparo sigue siendo válido?"
      - "¿Me desactivó la crítica antes de que pudiera pensarla bien?"
    countermeasure:
      doctrine: "Sostener la objeción aunque haya sido anticipada"
      move: "No darla por saldada: 'sí, lo pensé, y sigue siendo un problema; abordémoslo'."
      inoculation: "Que adivinen tu objeción no la responde: tu reparo sigue en pie."
    fp_guard: >
      Anticipar preocupaciones para abordarlas con honestidad es buena comunicación; la auditoría
      sólo dispara cuando se usa para desactivar tu objeción y empujarte contra tu mandato sin atenderla.
    maps_to: [persuasion.framing, rhetoric.presupposition]
